version: '3.8'

# OmniAgent v8.1 — Docker Compose
# Usage: docker compose up -d
# Then: docker compose exec ollama ollama pull qwen3:8b qwen2.5-coder:7b deepseek-r1:8b

services:
  omniagent:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - omni_data:/app/data
      - ~/.omniagent:/root/.omniagent
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - BITNET_PORT=8081
      - WORKER_SECRET=${WORKER_SECRET:-}
      - WORKER_URL=${WORKER_URL:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - SESSION_TTL_HOURS=${SESSION_TTL_HOURS:-72}
      - MAX_UPLOAD_DIR_MB=${MAX_UPLOAD_DIR_MB:-500}
    depends_on:
      - ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/identify"]
      interval: 30s
      timeout: 5s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  omni_data:
  ollama_data:
