name: OmniAgent CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: pip install -r requirements-ci.txt
      - name: Lint
        run: python -m py_compile src/web.py src/tools.py src/mcp.py src/persistence.py src/agents/orchestrator.py src/agents/base.py
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OmniAgent-Android.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  build-desktop-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Validate desktop bundle assets
        shell: bash
        run: |
          test -f desktop/src-tauri/icons/icon.png
          test -f desktop/src-tauri/icons/32x32.png
          test -f desktop/src-tauri/icons/128x128@2x.png
          test -f desktop/src-tauri/icons/icon.ico
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libjavascriptcoregtk-4.1-dev
      - name: Install Tauri CLI
        run: cargo install tauri-cli
      - name: Create frontend dist
        run: mkdir -p desktop/dist && cp desktop/dist/index.html desktop/dist/index.html 2>/dev/null || echo '<html><script>window.location.replace("http://localhost:8000")</script></html>' > desktop/dist/index.html
      - name: Build desktop (deb + rpm)
        working-directory: desktop
        run: cargo tauri build --bundles deb,rpm
      - name: Upload Linux deb
        uses: actions/upload-artifact@v4
        with:
          name: OmniAgent-Linux-amd64.deb
          path: desktop/src-tauri/target/release/bundle/deb/*.deb
      - name: Upload Linux rpm
        uses: actions/upload-artifact@v4
        with:
          name: OmniAgent-Linux-x86_64.rpm
          path: desktop/src-tauri/target/release/bundle/rpm/*.rpm

  build-desktop-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Validate desktop bundle assets
        shell: bash
        run: |
          test -f desktop/src-tauri/icons/icon.png
          test -f desktop/src-tauri/icons/32x32.png
          test -f desktop/src-tauri/icons/128x128@2x.png
          test -f desktop/src-tauri/icons/icon.ico
      - name: Install Tauri CLI
        run: cargo install tauri-cli
      - name: Create frontend dist
        shell: bash
        run: mkdir -p desktop/dist && echo '<html><script>window.location.replace("http://localhost:8000")</script></html>' > desktop/dist/index.html
      - name: Build desktop (msi + nsis)
        working-directory: desktop
        run: cargo tauri build --bundles msi,nsis
      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: OmniAgent-Windows-x64.msi
          path: desktop/src-tauri/target/release/bundle/msi/*.msi
      - name: Upload Windows NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: OmniAgent-Windows-x64-Setup.exe
          path: desktop/src-tauri/target/release/bundle/nsis/*.exe
